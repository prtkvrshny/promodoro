<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promodoro — Aesthetic Study Timer</title>
  <meta name="description" content="A beautiful, soothing Pomodoro study timer with pixel art ambience, rain sounds, and todo list.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
</head>
<body>

  <!-- ═══ Background Layers ═══ -->
  <div class="bg-layer">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="rain-container" id="rain-container"></div>
  </div>

  <!-- ═══ Toast Notification ═══ -->
  <div class="toast" id="toast"></div>

  <!-- ═══ Main App ═══ -->
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="logo">Promo<span>doro</span></div>
      <div class="quote-area">
        <p class="quote-text" id="quote-text">"Focus on being productive instead of busy."</p>
      </div>
    </header>

    <!-- Center: Timer -->
    <main class="main-content">
      <div class="timer-panel">

        <!-- Mode Tabs -->
        <div class="timer-modes">
          <button class="mode-btn active" data-mode="focus" id="mode-focus">Focus</button>
          <button class="mode-btn" data-mode="shortBreak" id="mode-short">Short Break</button>
          <button class="mode-btn" data-mode="longBreak" id="mode-long">Long Break</button>
        </div>

        <!-- Timer Ring -->
        <div class="timer-ring-wrapper">
          <svg class="timer-ring-svg" viewBox="0 0 300 300">
            <defs>
              <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="50%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#60a5fa"/>
              </linearGradient>
            </defs>
            <circle class="timer-ring-bg" cx="150" cy="150" r="140"/>
            <circle class="timer-ring-progress" id="timer-ring-progress" cx="150" cy="150" r="140"/>
          </svg>
          <div class="timer-display">
            <div class="timer-time" id="timer-time">25:00</div>
            <div class="timer-label" id="timer-label">Focus</div>
          </div>
        </div>

        <!-- Controls -->
        <div class="timer-controls">
          <button class="btn btn-icon" id="btn-reset" title="Reset (R)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          </button>
          <button class="btn btn-primary" id="btn-start">Start</button>
          <button class="btn btn-icon" id="btn-skip" title="Skip" style="visibility:hidden;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
          </button>
        </div>

        <!-- Session Dots -->
        <div class="session-counter" id="session-dots"></div>
      </div>
    </main>

    <!-- Bottom Bar -->
    <footer class="bottom-bar">
      <div class="left-tools">
        <button class="tool-btn" id="tool-todo" title="Todo List (T)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
        </button>
        <button class="tool-btn" id="tool-sound" title="Ambient Sounds">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </button>
        <button class="tool-btn" id="tool-settings" title="Settings (S)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>

      <div class="right-info">
        <span class="current-time" id="current-time">00:00</span>
        <button class="fullscreen-btn" id="btn-fullscreen" title="Fullscreen (F)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- ═══ Todo Panel ═══ -->
  <div class="todo-panel" id="todo-panel">
    <div class="todo-header">
      <h2 class="todo-title">Tasks</h2>
      <span class="todo-count" id="todo-count">0/0</span>
    </div>
    <div class="todo-input-wrap">
      <input type="text" class="todo-input" id="todo-input" placeholder="Add a task…" maxlength="80">
      <button class="todo-add-btn" id="todo-add-btn" title="Add task">+</button>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
  </div>

  <!-- ═══ Sound Panel ═══ -->
  <div class="sound-panel" id="sound-panel">
    <h3 class="sound-title">Ambient Sounds</h3>
    <div class="sound-option">
      <label for="rain-toggle">🌧️ Rain</label>
      <button class="sound-toggle" id="rain-toggle"></button>
    </div>
    <div class="sound-option" style="margin-top:6px;">
      <label>Volume</label>
    </div>
    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="0.4">
  </div>

  <!-- ═══ Settings Panel ═══ -->
  <div class="settings-panel" id="settings-panel">
    <h3 class="settings-title">Timer Settings</h3>
    <div class="settings-option">
      <label for="setting-focus">Focus (min)</label>
      <input type="number" id="setting-focus" min="1" max="120" value="25" class="settings-input">
    </div>
    <div class="settings-option">
      <label for="setting-short">Short Break (min)</label>
      <input type="number" id="setting-short" min="1" max="60" value="5" class="settings-input">
    </div>
    <div class="settings-option">
      <label for="setting-long">Long Break (min)</label>
      <input type="number" id="setting-long" min="1" max="60" value="15" class="settings-input">
    </div>
    <button class="settings-save-btn" id="settings-save-btn">Save Settings</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
